<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recon — Select Target</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

  :root {
    --bg:         #0a0b0d;
    --surface:    #0f1012;
    --surface2:   #141618;
    --border:     #1c1e21;
    --border2:    #242628;
    --text:       #d8dce3;
    --text-muted: #4a5060;
    --text-dim:   #7a8294;
    --accent:     #ff6b35;
    --accent-dim: #1f0e06;
    --green:      #39d98a;
    --green-dim:  #051a0e;
    --red:        #f75555;
    --red-dim:    #1f0808;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 14px; line-height: 1.6; min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: #000; border-bottom: 2px solid var(--accent);
    padding: 0 28px; display: flex; align-items: center; gap: 24px;
    position: sticky; top: 0; z-index: 200; height: 52px;
  }
  .header-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .brand-name { font-size: 18px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
  .brand-sub  { font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600; }
  .header-divider { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }
  .header-date { font-size: 12px; color: var(--text-muted); font-family: 'Fira Code', monospace; flex: 1; }

  /* ── Content ── */
  .content { padding: 40px 28px; max-width: 960px; }

  .page-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .page-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── Target grid ── */
  .target-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }

  .target-card {
    background: var(--surface); border: 1px solid var(--border2);
    padding: 20px 20px 16px; display: flex; flex-direction: column; gap: 16px;
    transition: border-color 0.15s;
  }
  .target-card:hover { border-color: var(--accent); }

  .target-card-domain {
    font-family: 'Fira Code', monospace; font-size: 13px;
    color: var(--text); word-break: break-all; flex: 1;
  }
  .target-card-meta {
    font-size: 11px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px;
  }

  .target-card-actions { display: flex; gap: 8px; }

  .btn {
    border: none; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 7px 16px; transition: all 0.1s;
    border-radius: 0;
  }
  .btn-primary {
    background: var(--accent); color: #000;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-danger {
    background: transparent; color: var(--red);
    border: 1px solid var(--red-dim);
  }
  .btn-danger:hover { background: var(--red-dim); }
  .btn-new {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); padding: 6px 18px;
  }
  .btn-new:hover { background: var(--accent-dim); }

  /* ── Empty state ── */
  .empty-state {
    border: 1px dashed var(--border2); padding: 48px 24px;
    text-align: center; color: var(--text-muted);
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 28px;
  }
  .empty-state p { margin-bottom: 20px; }

  /* ── Modal ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 400;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-top: 2px solid var(--accent);
    width: 420px; padding: 28px;
  }
  .modal-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--accent); margin-bottom: 20px;
  }
  .modal-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px;
  }
  .modal-input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border2);
    padding: 9px 14px; width: 100%; margin-bottom: 20px;
    font-family: 'Fira Code', monospace; font-size: 13px;
    transition: border-color 0.15s; border-radius: 0; outline: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text-muted); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  .modal-error {
    font-size: 12px; color: var(--red); margin-bottom: 14px;
    display: none;
  }
  .modal-error.visible { display: block; }

  /* ── Status indicator ── */
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    background: var(--green); border-radius: 50%; margin-right: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#4d9fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <div>
      <div class="brand-name">Recon Dashboard</div>
      <div class="brand-sub">Target Selection</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <div class="header-date" id="header-date"></div>
  <button class="btn btn-new" onclick="openModal()">+ New Target</button>
</div>

<!-- New Target Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-title">New Target</div>
    <div class="modal-label">Domain</div>
    <input
      class="modal-input" id="domain-input"
      type="text" placeholder="e.g. example.com"
      onkeydown="if(event.key==='Enter') submitNew()"
    >
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitNew()">Create</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="page-title">Active Targets</div>
  <div id="target-area">
    <div class="empty-state"><p>Loading targets...</p></div>
  </div>
</div>

<script>
  document.getElementById('header-date').textContent = new Date().toLocaleString();

  // ── Load targets ──
  function loadTargets() {
    fetch('/api/targets')
      .then(r => r.json())
      .then(data => renderTargets(data.targets || []))
      .catch(() => renderTargets([]));
  }

  function renderTargets(targets) {
    const area = document.getElementById('target-area');

    if (!targets.length) {
      area.innerHTML = `
        <div class="empty-state">
          <p>No targets yet.</p>
          <button class="btn btn-primary" onclick="openModal()">+ New Target</button>
        </div>`;
      return;
    }

    const cards = targets.map(t => `
      <div class="target-card">
        <div>
          <div class="target-card-domain">${escHtml(t)}</div>
          <div class="target-card-meta"><span class="status-dot"></span>Database ready</div>
        </div>
        <div class="target-card-actions">
          <button class="btn btn-primary" onclick="selectTarget('${escHtml(t)}')">Select</button>
        </div>
      </div>
    `).join('');

    area.innerHTML = `<div class="target-grid">${cards}</div>`;
  }

  // ── Select target ──
  function selectTarget(domain) {
    localStorage.setItem('recon_target', domain);
    window.location.href = '/index.html';
  }

  // ── Modal ──
  function openModal() {
    document.getElementById('domain-input').value = '';
    document.getElementById('modal-error').classList.remove('visible');
    document.getElementById('modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('domain-input').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function submitNew() {
    const domain = document.getElementById('domain-input').value.trim();
    const errEl  = document.getElementById('modal-error');

    if (!domain) {
      errEl.textContent = 'Domain cannot be empty.';
      errEl.classList.add('visible');
      return;
    }

    errEl.classList.remove('visible');

    fetch('/api/targets/new', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain }),
    })
      .then(r => {
        if (!r.ok) return r.text().then(t => { throw new Error(t); });
        return r.json();
      })
      .then(() => {
        closeModal();
        loadTargets();
      })
      .catch(err => {
        errEl.textContent = err.message || 'Failed to create target.';
        errEl.classList.add('visible');
      });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadTargets();
</script>
</body>
</html>
