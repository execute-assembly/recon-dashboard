<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recon — Select Target</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap');

  :root {
    --bg:         #0a0b0d;
    --surface:    #0f1012;
    --surface2:   #141618;
    --border:     #1c1e21;
    --border2:    #242628;
    --text:       #d8dce3;
    --text-muted: #4a5060;
    --text-dim:   #7a8294;
    --accent:     #4d9fff;
    --accent-dim: #0a1a30;
    --green:      #39d98a;
    --green-dim:  #051a0e;
    --orange:     #ffb020;
    --red:        #f75555;
    --red-dim:    #1f0808;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg); color: var(--text);
    font-size: 13px; line-height: 1.5; min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface); border-bottom: 2px solid var(--accent);
    padding: 0 28px; display: flex; align-items: center; gap: 20px;
    position: sticky; top: 0; z-index: 200; height: 48px;
  }
  .header-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .brand-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .header-divider { width: 1px; height: 16px; background: var(--border2); flex-shrink: 0; }
  .header-date { font-size: 12px; color: var(--text-muted); font-family: 'Fira Code', monospace; flex: 1; }
  .header-meta { font-size: 12px; color: var(--text-muted); font-family: 'Fira Code', monospace; }
  .header-meta span { color: var(--accent); }

  /* ── Content ── */
  .content { padding: 32px 40px; max-width: 1400px; }

  /* ── Page header bar ── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px; gap: 16px;
  }
  .ph-left { display: flex; flex-direction: column; gap: 3px; }
  .ph-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .ph-meta { font-size: 13px; color: var(--text); font-family: 'Fira Code', monospace; }
  .ph-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* ── Filter ── */
  .filter-wrap { position: relative; display: flex; align-items: center; }
  .filter-wrap svg { position: absolute; left: 8px; color: var(--text-muted); pointer-events: none; }
  .filter-input {
    background: var(--surface); color: var(--text); border: 1px solid var(--border2);
    padding: 6px 10px 6px 28px; width: 220px;
    font-family: 'Fira Code', monospace; font-size: 12px;
    transition: border-color 0.1s; border-radius: 0; outline: none;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text-muted); }

  /* ── Target table ── */
  .table-wrap { border: 1px solid var(--border); overflow: hidden; }
  .target-table { width: 100%; border-collapse: collapse; }
  .target-table thead { background: var(--surface); }
  .target-table th {
    font-size: 12px; color: var(--text-muted); font-weight: 500;
    text-align: left; padding: 10px 18px;
    border-bottom: 1px solid var(--border2); white-space: nowrap;
  }
  .target-table th.th-num { text-align: right; }
  .target-table td {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-size: 14px; vertical-align: middle; color: var(--text-dim);
  }
  .target-table tbody tr:last-child td { border-bottom: none; }
  .target-table tbody tr { cursor: pointer; transition: background 0.1s; }
  .target-table tbody tr:hover td { background: var(--surface2); color: var(--text); }
  .target-table tbody tr.is-active { border-left: 2px solid var(--accent); }
  .target-table tbody tr.is-active td { background: var(--accent-dim); }
  .target-table tbody tr.is-active:hover td { background: #0d2040; }
  .target-table tbody tr.hidden { display: none; }

  /* ── Cell types ── */
  .td-domain {
    font-family: 'Fira Code', monospace; font-size: 15px;
    color: var(--text); word-break: break-all; min-width: 280px;
  }
  .td-domain .active-badge {
    display: inline-block; font-size: 9px; font-family: 'IBM Plex Sans', sans-serif;
    color: var(--accent); border: 1px solid var(--accent);
    padding: 1px 5px; margin-left: 8px; vertical-align: middle; font-weight: 500;
  }
  .td-num { text-align: right; font-family: 'Fira Code', monospace; font-size: 14px; }
  .td-num.clr-green { color: var(--green); }
  .td-num.clr-red   { color: var(--red); }
  .td-num.clr-orange { color: var(--orange); }
  .td-num.clr-dim   { color: var(--text-muted); }
  .td-status { white-space: nowrap; }
  .status-dot {
    display: inline-block; width: 5px; height: 5px;
    background: var(--green); border-radius: 50%; margin-right: 6px;
  }
  .td-actions { text-align: right; white-space: nowrap; padding-right: 14px; }

  /* ── Buttons ── */
  .btn {
    border: none; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px; font-weight: 500; padding: 5px 14px; transition: opacity 0.1s;
    border-radius: 0;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    background: transparent; color: var(--text-muted); border: 1px solid var(--border2);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-new {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); padding: 5px 14px;
  }
  .btn-new:hover { background: var(--accent-dim); }
  .btn-danger {
    background: transparent; color: var(--red);
    border: 1px solid var(--red-dim); padding: 5px 10px;
  }
  .btn-danger:hover { background: var(--red-dim); border-color: var(--red); }
  .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Empty state ── */
  .empty-state {
    border: 1px dashed var(--border2); padding: 48px 24px;
    text-align: center; color: var(--text-muted); font-size: 12px;
  }
  .empty-state p { margin-bottom: 20px; }

  /* ── Summary bar (below table) ── */
  .summary-bar {
    display: flex; align-items: center; gap: 24px;
    padding: 10px 18px; border: 1px solid var(--border); border-top: none;
    background: var(--surface); font-size: 13px; color: var(--text-muted);
    font-family: 'Fira Code', monospace;
  }
  .summary-bar .sb-item { display: flex; align-items: center; gap: 7px; }
  .summary-bar .sb-val { color: var(--text); font-weight: 500; font-size: 15px; }
  .summary-bar .sb-val.green { color: var(--green); }
  .summary-bar .sb-divider { width: 1px; height: 14px; background: var(--border2); }

  /* ── Modal ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 400;
    align-items: center; justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-top: 2px solid var(--accent); width: 420px; padding: 28px;
  }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .modal-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .modal-input {
    background: var(--bg); color: var(--text); border: 1px solid var(--border2);
    padding: 9px 14px; width: 100%; margin-bottom: 6px;
    font-family: 'Fira Code', monospace; font-size: 13px;
    transition: border-color 0.15s; border-radius: 0; outline: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text-muted); }
  .modal-hint { font-size: 11px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-error { font-size: 12px; color: var(--red); margin-bottom: 14px; display: none; }
  .modal-error.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4d9fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <div class="brand-name">Recon Dashboard</div>
  </div>
  <div class="header-divider"></div>
  <div class="header-date" id="header-date"></div>
  <div class="header-divider"></div>
  <div class="header-meta" id="header-active">
    active target: <span id="header-active-val">none</span>
  </div>
</div>

<!-- New Target Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-title">New Target</div>
    <div class="modal-desc">Creates a new SQLite database for the target scope.</div>
    <div class="modal-label">Domain</div>
    <input
      class="modal-input" id="domain-input"
      type="text" placeholder="e.g. example.com"
      onkeydown="if(event.key==='Enter') submitNew()"
    >
    <div class="modal-hint">Subdomains and hosts will be scoped under this root domain.</div>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitNew()">Create</button>
    </div>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <div class="ph-left">
      <div class="ph-title">Active Targets</div>
      <div class="ph-meta" id="ph-meta">loading...</div>
    </div>
    <div class="ph-right">
      <div class="filter-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="filter-input" id="filter-input" type="text" placeholder="Filter targets..." oninput="filterTargets()">
      </div>
      <button class="btn btn-new" onclick="openModal()">+ New Target</button>
    </div>
  </div>

  <div id="target-area">
    <div class="empty-state"><p>Loading...</p></div>
  </div>
</div>

<script>
  document.getElementById('header-date').textContent = new Date().toLocaleString();

  const activeTarget = localStorage.getItem('recon_target') || null;
  document.getElementById('header-active-val').textContent = activeTarget || 'none';

  // ── Load targets ──
  function loadTargets() {
    fetch('/api/targets')
      .then(r => r.json())
      .then(data => renderTargets(data.targets || []))
      .catch(() => renderTargets([]));
  }

  function renderTargets(targets) {
    const area = document.getElementById('target-area');

    if (!targets.length) {
      document.getElementById('ph-meta').textContent = '0 targets';
      area.innerHTML = `
        <div class="empty-state">
          <p>No targets yet.</p>
          <button class="btn btn-primary" onclick="openModal()">+ New Target</button>
        </div>`;
      return;
    }

    document.getElementById('ph-meta').textContent = `${targets.length} target${targets.length !== 1 ? 's' : ''}`;

    const rows = targets.map((t, i) => {
      const isActive = t === activeTarget;
      return `
        <tr data-domain="${escHtml(t)}" class="${isActive ? 'is-active' : ''}" onclick="selectTarget('${escHtml(t)}')">
          <td class="td-domain">
            ${escHtml(t)}
            ${isActive ? '<span class="active-badge">active</span>' : ''}
          </td>
          <td class="td-num clr-dim" id="st-total-${i}">—</td>
          <td class="td-num clr-green" id="st-200-${i}">—</td>
          <td class="td-num clr-orange" id="st-403-${i}">—</td>
          <td class="td-num clr-red" id="st-500-${i}">—</td>
          <td class="td-status"><span class="status-dot"></span>ready</td>
          <td class="td-actions" onclick="event.stopPropagation()">
            <button class="btn btn-primary" onclick="selectTarget('${escHtml(t)}')">Select →</button>
            <button class="btn btn-danger" id="del-${i}" onclick="deleteTarget('${escHtml(t)}', ${i})">Delete</button>
          </td>
        </tr>`;
    }).join('');

    area.innerHTML = `
      <div class="table-wrap">
        <table class="target-table">
          <thead><tr>
            <th>Domain</th>
            <th class="th-num">Total hosts</th>
            <th class="th-num">200 OK</th>
            <th class="th-num">403</th>
            <th class="th-num">5xx</th>
            <th>Status</th>
            <th></th>
          </tr></thead>
          <tbody id="target-tbody">${rows}</tbody>
        </table>
        <div class="summary-bar" id="summary-bar">
          <div class="sb-item">targets <span class="sb-val" id="sb-targets">${targets.length}</span></div>
          <div class="sb-divider"></div>
          <div class="sb-item">total hosts <span class="sb-val" id="sb-hosts">—</span></div>
          <div class="sb-divider"></div>
          <div class="sb-item">alive <span class="sb-val green" id="sb-alive">—</span></div>
        </div>
      </div>`;

    // Load stats for each target concurrently
    let totalHosts = 0, totalAlive = 0, loaded = 0;
    targets.forEach((t, i) => {
      fetch(`/api/${encodeURIComponent(t)}/hosts`)
        .then(r => r.json())
        .then(data => {
          const s = data.stats || {};
          const total = s.total ?? '—';
          const s200  = s.s200  ?? '—';
          const s403  = s.s403  ?? '—';
          const s500  = s.s500  ?? '—';
          const elTotal = document.getElementById(`st-total-${i}`);
          const el200   = document.getElementById(`st-200-${i}`);
          const el403   = document.getElementById(`st-403-${i}`);
          const el500   = document.getElementById(`st-500-${i}`);
          if (elTotal) elTotal.textContent = total;
          if (el200)   el200.textContent   = s200;
          if (el403)   el403.textContent   = s403;
          if (el500)   el500.textContent   = s500;
          if (typeof total === 'number') totalHosts += total;
          if (typeof s200  === 'number') totalAlive += s200;
        })
        .catch(() => {})
        .finally(() => {
          loaded++;
          if (loaded === targets.length) {
            const sbHosts = document.getElementById('sb-hosts');
            const sbAlive = document.getElementById('sb-alive');
            if (sbHosts) sbHosts.textContent = totalHosts || '—';
            if (sbAlive) sbAlive.textContent = totalAlive || '—';
          }
        });
    });
  }

  // ── Filter ──
  function filterTargets() {
    const q = document.getElementById('filter-input').value.toLowerCase();
    document.querySelectorAll('#target-tbody tr').forEach(row => {
      const domain = (row.dataset.domain || '').toLowerCase();
      row.classList.toggle('hidden', q.length > 0 && !domain.includes(q));
    });
  }

  // ── Select target ──
  function selectTarget(domain) {
    localStorage.setItem('recon_target', domain);
    window.location.href = '/index.html';
  }

  // ── Delete target ──
  function deleteTarget(domain, idx) {
    const btn = document.getElementById(`del-${idx}`);
    if (!btn) return;
    btn.disabled = true;
    btn.textContent = '...';
    fetch(`/api/delete/${encodeURIComponent(domain)}`, { method: 'DELETE' })
      .then(r => {
        if (!r.ok) throw new Error('failed');
        const row = document.querySelector(`tr[data-domain="${CSS.escape(domain)}"]`);
        if (row) row.remove();
        // update active target display if it was the deleted one
        if (domain === localStorage.getItem('recon_target')) {
          localStorage.removeItem('recon_target');
          document.getElementById('header-active-val').textContent = 'none';
        }
        // update target count
        const remaining = document.querySelectorAll('#target-tbody tr:not(.hidden)').length;
        document.getElementById('ph-meta').textContent = `${remaining} target${remaining !== 1 ? 's' : ''}`;
        document.getElementById('sb-targets').textContent = remaining;
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = 'Delete';
      });
  }

  // ── Modal ──
  function openModal() {
    document.getElementById('domain-input').value = '';
    document.getElementById('modal-error').classList.remove('visible');
    document.getElementById('modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('domain-input').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function submitNew() {
    const domain = document.getElementById('domain-input').value.trim();
    const errEl  = document.getElementById('modal-error');
    if (!domain) {
      errEl.textContent = 'Domain cannot be empty.';
      errEl.classList.add('visible');
      return;
    }
    errEl.classList.remove('visible');
    fetch('/api/targets/new', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain }),
    })
      .then(r => {
        if (!r.ok) return r.text().then(t => { throw new Error(t); });
        return r.json();
      })
      .then(() => { closeModal(); loadTargets(); })
      .catch(err => {
        errEl.textContent = err.message || 'Failed to create target.';
        errEl.classList.add('visible');
      });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadTargets();
</script>
</body>
</html>
